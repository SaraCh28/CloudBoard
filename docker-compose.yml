# ──────────────────────────────────────────────────────────────
# CloudBoard – Local Development Stack
# Usage: docker-compose up --build
# ──────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cloudboard-db
    environment:
      POSTGRES_USER: cloudboard
      POSTGRES_PASSWORD: cloudboard
      POSTGRES_DB: cloudboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cloudboard-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudboard-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://cloudboard:cloudboard@postgres:5432/cloudboard
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: dev-secret-change-in-production
      ENVIRONMENT: development
      DEBUG: "true"
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  pgdata:
